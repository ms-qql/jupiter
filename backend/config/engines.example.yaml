# Engine-Registry (PROJ-18) — weitere Engines, iFrames und Launch-Einträge.
#
# Kopiere diese Datei nach `engines.yaml` (gleiches Verzeichnis) und passe sie an.
# Sie wird live (mtime-geprüft) nachgeladen — kein Backend-Neustart nötig. Fehlt sie
# oder ist sie kaputt, läuft Jupiter mit NUR der eingebauten Claude-Engine weiter.
#
# WICHTIG: Hier stehen NIE Secrets. API-Keys werden ausschließlich über den NAMEN einer
# Server-Umgebungsvariable referenziert (`auth_env`); den Wert liest der Treiber aus der
# Umgebung (.env / systemd). Der Schlüssel `claude` ist reserviert (eingebaute Engine).

engines:
  # --- Tiefe 1: Treiber ----------------------------------------------------

  # OpenAI über die HTTP-API — die ERSTE Test-Engine (Treiber-Tiefe, driver: openai).
  # Reine Chat-Engine ohne Claude-Code-Tools → keine Decision Cards/Phasen-Gate
  # (degradiert sauber); Token-/Kontext-Anzeige funktioniert (Usage aus der API).
  - key: openai
    label: "OpenAI (GPT)"
    kind: engine
    driver: openai
    auth_env: OPENAI_API_KEY          # nur der Variablenname — NIE der Key selbst
    api_base: https://api.openai.com
    api_path: /v1/chat/completions
    models: [gpt-4o, gpt-4o-mini, o3-mini]
    default_model: gpt-4o-mini
    context_window: 128000
    capabilities: [usage, multi_turn]

  # OpenRouter — die ZWEITE Test-Engine. OpenRouter ist OpenAI-API-kompatibel, daher
  # läuft es über DENSELBEN `openai`-Treiber wie oben — nur anderer api_base/auth_env,
  # KEIN neuer Code. Ein Treiber, zwei Anbieter → der eigentliche Abstraktions-Nachweis.
  # Modellnamen sind anbieter-präfigiert (z. B. `anthropic/claude-3.5-sonnet`).
  - key: openrouter
    label: "OpenRouter"
    kind: engine
    driver: openai
    auth_env: OPENROUTER_API_KEY      # nur der Variablenname — NIE der Key selbst
    api_base: https://openrouter.ai/api
    api_path: /v1/chat/completions
    models: [openai/gpt-4o-mini, anthropic/claude-3.5-sonnet, google/gemini-flash-1.5]
    default_model: openai/gpt-4o-mini
    context_window: 128000
    capabilities: [usage, multi_turn]

  # PROJ-51: Swisscom als OpenAI-kompatibler HTTP-Provider. Der Eintrag ist bewusst
  # deaktiviert, bis api_base/Modelle/Auth-Env zum echten Tenant passen. Die App-
  # Einstellungen können ihn aktivieren und Modelle/Default direkt in engines.yaml
  # speichern — API-Key-Werte bleiben weiter ausschließlich in der Server-Umgebung.
  - key: swisscom
    label: "Swisscom"
    kind: engine
    enabled: false
    driver: openai
    auth_env: SWISSCOM_API_KEY
    api_base: https://api.swisscom.com
    api_path: /v1/chat/completions
    models: [swiss-ai-large]
    default_model: swiss-ai-large
    context_window: 128000
    capabilities: [usage, multi_turn]

  # PROJ-48: OpenAI Codex CLI über den generischen Treiber (kein Code pro Engine).
  # Platzhalter: {model} {session_id} {project_path} {prompt} {resume_id}.
  # adapter: claude | jsonl | plaintext | codex  (normalisiert den Ausgabestrom).
  #
  # Auth: KEIN auth_env/API-Key — Codex nutzt die eingeloggte ChatGPT-Pro-Subscription
  #   (~/.codex/auth.json über geerbtes HOME=/home/dev), genau wie Claude Max.
  # Sandbox: `-s workspace-write` ist die EINZIGE Leitplanke (generic_cli hat keine
  #   Decision Cards/Watchdog) — Codex darf im Projektordner lesen+editieren, nicht
  #   beliebig ins System/Netz. `--skip-git-repo-check` erlaubt auch Nicht-Git-Projekte.
  # Multi-Turn: oneshot je Turn; Folge-Turns über `resume_argv_template` (Kontext bleibt
  #   am thread_id aus `thread.started`, vom codex-Adapter als resume_id durchgereicht).
  - key: codex
    label: "OpenAI Codex"
    kind: engine
    driver: generic_cli
    bin: /home/dev/.local/bin/codex
    argv_template: ["exec", "-m", "{model}", "-s", "workspace-write", "--skip-git-repo-check", "--json", "-"]
    resume_argv_template: ["exec", "-m", "{model}", "-s", "workspace-write", "--skip-git-repo-check", "--json", "resume", "{resume_id}", "-"]
    adapter: codex
    prompt_via: stdin                 # stdin | arg ('-' im argv → Codex liest den Prompt von stdin)
    input_format: text                # text | stream_json
    oneshot: true                     # stdin nach Eingabe schließen (Single-Turn-CLI)
    models: [gpt-5.5]
    default_model: gpt-5.5            # am Live-System verifiziert (config.toml); gpt-5-codex ist veraltet
    capabilities: [usage, resume, multi_turn, abc]

  # Beispiel: lokales Ollama (kein Key nötig). Streamt Klartext → plaintext-Adapter
  # (eingeschränkte Live-Sicht, keine Token-Anzeige → „n/v").
  - key: ollama
    label: "Ollama (lokal)"
    kind: engine
    driver: generic_cli
    bin: ollama
    argv_template: ["run", "{model}"]
    adapter: plaintext
    prompt_via: stdin
    input_format: text
    oneshot: true
    models: [llama3, qwen2.5-coder]
    default_model: llama3

  # --- Tiefe 2: iFrame -----------------------------------------------------
  # Eine fremde Web-App eingebettet. Verweigert sie die Einbettung (X-Frame-Options),
  # zeigt das Frontend einen Hinweis + Fallback auf einen Launch-Button.
  #
  # PROJ-40: `group: micro` hebt einen iFrame-Eintrag aus dem „Werkzeuge"-Tab in die
  # Sidebar-Sektion „Micro-Apps" (Vollbild-Route /apps/[key]). `group: orchestration`
  # täte dasselbe für die Orchestration-Sektion (PROJ-39). Ohne `group` bleibt der
  # Eintrag im Werkzeuge-Tab. `icon` = lucide-Name für die Sidebar.
  - key: excalidraw
    label: "Excalidraw (Whiteboard)"
    kind: iframe
    group: micro
    icon: pentool
    url: https://excalidraw.com
    sandbox: "allow-scripts allow-same-origin allow-forms"

  # PROJ-40/PROJ-41: NATIVE Micro-App — direkt in Jupiter programmiert (kein iFrame).
  # Code liegt im Frontend unter components/microapps/<key>/ und wird per `key` in
  # lib/microapps-registry.ts registriert; hier stehen nur die Metadaten. Erste echte
  # native App: „Video Summary" (PROJ-41) — eine URL-Queue, die der
  # `hal-video-summary`-Skill je Video in Notiz+PDF (Hal-Vault) umwandelt.
  - key: video_summary
    label: "Video Summary"
    kind: native
    group: micro
    icon: film

  # PROJ-42: VPS-Admin — Dashboard (native Micro-App). Read-only Host-Metriken
  # (CPU/RAM/Disk/Load/Swap/Netz/Uptime/Prozesse) + systemd-Service-Health über
  # GET /metrics/current (Polling) + /metrics/status (leichte Gesamt-Ampel fürs
  # Sidebar-Farb-Icon). Code unter components/microapps/vps_admin/, registriert in
  # lib/microapps-registry.ts. Terminal (PROJ-43) dockt an dieselbe Kachel an.
  - key: vps_admin
    label: "VPS-Admin"
    kind: native
    group: micro
    icon: server

  # --- Tiefe 3: Launch-Button ---------------------------------------------
  # Für nicht integrierbare Tools: öffnet/startet extern.
  - key: gpt-web
    label: "ChatGPT (Web)"
    kind: launch
    target: https://chat.openai.com
